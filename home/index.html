<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos</title>
</head>
<style>
  .task{
      border: 1px solid gray;
      border-radius: 4px;
      margin-bottom: 3px
  }
</style>
<body>

  <button onclick="addTask()">Add your task</button>
  <div id="tasks">
  </div>
  
 <script>
  const tasks=[
    {name:'shalaa ugaah', status:'todo'},
    {name:'hivsee ugaah', status:'todo'},
    {name:'duuge harah', status:'todo'}
  ];
  function render(){
    const output=document.getElementById('tasks');
    output.innerHTML="";
    for (let i=0; i<tasks.length; i++){
      output.innerHTML +='<div class="task">' + tasks[i].name + '</div>';
    }
  }

  function addTask(){
    const name=prompt();
    tasks.push({name: name, status:"todo"});
    render()
  }

  // function deleteTask(index){

  //     if (i !==index){
  //       arr.push(tasks[i])
  //     }
  //   }


  // }

  render()
 </script>

</body>
</html>
