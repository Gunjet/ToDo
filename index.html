<body class="body">

<div class="c">
  <div class="button-container">
    <button onclick="addTodo()" class="button">Add task</button>

  </div>

<div id="todo" class="todos">
    <div class="t">
      <div class="circle-white"></div>
      <h1 class="title">To do</h1>
      <div id="tasks"></div>
    </div>
</div>

  <div id="in-progress" class="todos">
    <div class="t">
      <div class="circle-yellow"></div>
      <h1 class="title">In progress</h1>
      <div id="tasks"></div>
    </div>
</div>

<div id="done" class="todos">
  <div class="t">
    <div class="circle-green"></div>
    <h1 class="title">Done</h1>
    <div id="tasks"></div>
  </div>
</div>

<div id="blocked" class="todos">
  <div class="t">
    <div class="circle-red"></div>
    <h1 class="title">Blocked</h1>
    <div id="tasks"></div>
  </div>
</div>

</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
<div id="modal">
  <div class="modal-content">
    <h2>Enter task</h2>
    <input type="text" id="task-name">

    <select id="task-status" value="todo">
      <option value="todo">Todo</option>
      <option value="in-progress">In progress</option>
      <option value="done">Done</option>
      <option value="blocked">Blocked</option>
    </select>
    <button onclick="saveTodo()">Add task</button>
  </div>
</div>
